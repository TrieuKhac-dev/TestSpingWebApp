import com.github.spotbugs.snom.SpotBugsTask

plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.3'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'
    id 'checkstyle'
    id 'com.github.spotbugs' version '6.0.15'
    id 'org.owasp.dependencycheck' version '9.0.10'
    id 'com.diffplug.spotless' version '6.25.0'
    id 'com.github.jakemarsden.git-hooks' version '0.0.2'
}

group = 'io.trieukhac'
version = '0.0.1-SNAPSHOT'
description = 'pet-shop-webapp'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // test/dev
    testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
    testImplementation 'org.testcontainers:testcontainers-junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.testcontainers:junit-jupiter:1.19.8'
    testImplementation 'org.mockito:mockito-core:5.12.0'
    testImplementation 'io.rest-assured:rest-assured:5.4.0'

    // Embedded DB for tests -> fix DataSource autoconfig errors
    testImplementation 'com.h2database:h2:2.2.220'
}

// ---------- test config ----------
test {
    useJUnitPlatform()
    finalizedBy('jacocoTestReport') // tạo report sau test
}

// ---------- JaCoCo ----------
jacoco {
    toolVersion = "0.8.12"
}

jacocoTestReport {
    dependsOn(test)
    reports {
        xml.required = true
        html.required = true
    }
}

jacocoTestCoverageVerification {
    dependsOn(jacocoTestReport)
    violationRules {
        rule {
            limit {
                minimum = 0.80
            }
        }
    }
}

check.dependsOn jacocoTestCoverageVerification

// ---------- Checkstyle ----------
checkstyle {
    toolVersion = '10.17.0'
    configDirectory = file("${rootDir}/config/checkstyle")
}

//tasks.withType(Checkstyle) {
    // không fail build cứng do checkstyle (tùy policy); để cảnh báo bằng cách thay đổi severity
//    ignoreFailures = false // nếu muốn không block, set true
//}

// ---------- SpotBugs ----------
spotbugs {
    toolVersion = '4.9.8'
    effort = 'min'          // min để nhanh hơn; đổi thành 'max' nếu muốn phân tích sâu
    reportLevel = 'low'     // cảnh báo level thấp để tránh spam
}

tasks.withType(SpotBugsTask).configureEach {
    ignoreFailures = Boolean.parseBoolean(
            (project.findProperty("spotbugsIgnoreFailures") ?: "false").toString()
    )
}

// ---------- Spotless (format) ----------
spotless {
    java {
        googleJavaFormat()
        target 'src/**/*.java'
    }
}

// ---------- precommit ----------
tasks.register("precommit") {
    group = "verification"
    description = "Quick local checks before commit: format + style + spotbugs"
    dependsOn("spotlessApply", "checkstyleMain", "spotbugsMain")
}

// git hooks plugin: gọi precommit (plugin sẽ tạo .git/hooks/pre-commit khi gradle chạy)
gitHooks {
    hooks = [
            'pre-commit': 'precommit'
    ]
}

// ---------- OWASP Dependency Check ----------
dependencyCheck {
    failBuildOnCVSS = Integer.parseInt(
            (project.findProperty("dependencyCheckFailBuildOnCVSS") ?: "7").toString()
    )
    suppressionFile = "${projectDir}/dependency-check-suppressions.xml"
}

// ---------- convenience tasks ----------
tasks.register("format") {
    group = "formatting"
    description = "Run Spotless apply to format code"
    dependsOn("spotlessApply")
}
