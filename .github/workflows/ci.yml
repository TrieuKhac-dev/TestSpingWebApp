name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build & run tests
        run: ./gradlew --no-daemon clean test jacocoTestReport --stacktrace

      - name: Upload jacoco xml to artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/reports/jacoco/jacocoTestReport.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Run SpotBugs
        run: ./gradlew spotbugsMain spotbugsTest

      - name: Run OWASP Dependency Check
        run: ./gradlew dependencyCheckAnalyze
        # dependency-check will create report in build/reports/dependency-check-report.html

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v2
        with:
          config: 'auto'

      - name: Run gitleaks scan (sensitive data)
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --source=.

      - name: Build Docker image
        run: docker build -t pet-shop-webapp:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        uses: aquasec/trivy-action@v0.3.2
        with:
          image-ref: pet-shop-webapp:${{ github.sha }}
          scan-type: image
