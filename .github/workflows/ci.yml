name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Show Java version
        run: java -version

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build & run tests
        run: ./gradlew --no-daemon clean build jacocoTestReport jacocoTestCoverageVerification --stacktrace

      - name: Upload jacoco HTML (artifact for debugging)
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: build/reports/jacoco

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/reports/jacoco/jacocoTestReport.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Run SpotBugs
        run: ./gradlew spotbugsMain spotbugsTest --no-daemon --stacktrace

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-report
          path: build/reports/spotbugs

#      - name: Install Semgrep
#        run: python -m pip install --upgrade pip semgrep
#
#      - name: Run Semgrep SAST
#        run: |
#          semgrep scan \
#            --config auto \
#            --error \
#            --sarif \
#            --output semgrep-report.sarif
#
#      - name: Upload Semgrep SARIF to GitHub Security tab
#        if: always()
#        uses: github/codeql-action/upload-sarif@v3
#        with:
#          sarif_file: semgrep-report.sarif

      - name: Run gitleaks scan (sensitive data)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

      - name: Build Docker image
        run: docker build -t pet-shop-webapp:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: pet-shop-webapp:${{ github.sha }}
          format: 'json'
          output: trivy-report.json
          ignore-unfixed: true
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-report.json
