name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Show Java version
        run: java -version

      - name: Build & run tests
        run: ./gradlew --no-daemon clean build jacocoTestReport jacocoTestCoverageVerification --stacktrace

      - name: Upload jacoco HTML (artifact for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/reports/jacoco/jacocoTestReport.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Run SpotBugs
        run: ./gradlew spotbugsMain spotbugsTest --no-daemon --stacktrace

      - name: Run OWASP Dependency Check
        run: ./gradlew dependencyCheckAnalyze --no-daemon --stacktrace
        # dependency-check will create report in build/reports/dependency-check-report.html
        # See gradle.properties for the threshold (set dependencyCheckFailBuildOnCVSS=7)

      - name: Run Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

      - name: Run gitleaks scan (sensitive data)
        uses: zricethezav/gitleaks-action@v2

      - name: Build Docker image
        run: docker build -t pet-shop-webapp:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: pet-shop-webapp:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          scan-type: image
